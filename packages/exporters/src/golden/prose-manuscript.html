<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Hollow Crown</title>
<style>
  @page { size: Letter; margin: 1in; }
  body { font-family: "Literata", Georgia, serif; font-size: 12pt; line-height: 1.9; color: #111; }
  h1 { text-align: center; font-size: 16pt; margin: 0 0 24pt; }
  hr { border: none; border-top: 1px solid #999; margin: 24pt auto; width: 40%; }
  blockquote { border-left: 2px solid #999; padding-left: 12pt; color: #444; }
  pre { font-family: monospace; background: #f4f4f4; padding: 8pt; }
</style>
</head>
<body>

  <section>
    <h1>The Long Way Down</h1>
    <p>Yuki counted <strong>ninety-nine</strong> steps as she fell.</p>
<p>The city did not forgive heights.</p>
  </section>
<hr/>

  <section>
    <h1>The Door</h1>
    <p>The door was not there yesterday.</p>
<blockquote><p>Doors are just decisions you can open.</p></blockquote>
  </section>
</body>
</html>
